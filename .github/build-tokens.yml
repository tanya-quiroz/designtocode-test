# ─────────────────────────────────────────────────────────────
# Design Token Pipeline
# ─────────────────────────────────────────────────────────────
# WHAT THIS DOES:
#   Every time token JSON files are pushed to GitHub, this Action
#   runs Style Dictionary to build the CSS output automatically.
#
# WHEN IT RUNS:
#   • Any branch  → builds tokens and checks for errors (safety net)
#   • main branch → builds tokens AND commits the CSS back to the repo
#                   so Storybook always has the latest output
# ─────────────────────────────────────────────────────────────

name: Build Design Tokens

on:
  push:
    paths:
      # Only trigger when token files actually change,
      # not on every single commit to the repo
      - 'designtocode-test/**/*.json'
      - 'build-tokens.js'
      - 'package.json'

jobs:

  # ── JOB 1: Runs on every branch ─────────────────────────────
  # Builds tokens and reports errors — nothing gets committed.
  # Think of this as the "does it work?" check.
  build-check:
    name: Build & validate tokens
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build tokens
        run: npm run build:tokens

      - name: Show build output
        # Prints the generated files so you can see them in the Action log
        run: |
          echo "✅ Build succeeded. Generated files:"
          ls -lh build/

  # ── JOB 2: Runs on main branch only ─────────────────────────
  # After the check passes, this commits the built CSS back to
  # the repo so Storybook always has the latest token output.
  commit-output:
    name: Commit built CSS to main
    runs-on: ubuntu-latest
    needs: build-check  # only runs if Job 1 succeeded
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Needed so the Action can push commits back to the repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build tokens
        run: npm run build:tokens

      - name: Commit built CSS files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage only the build output folder
          git add build/

          # Only commit if something actually changed
          # (avoids empty commits when tokens didn't change)
          if git diff --staged --quiet; then
            echo "No changes to commit — build output is already up to date."
          else
            git commit -m "chore: rebuild tokens from Tokens Studio [skip ci]"
            git push
          fi
