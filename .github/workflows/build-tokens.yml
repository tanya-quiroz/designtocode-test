name: Build Design Tokens

on:
  push:
    paths:
      - 'designtocode-test/**/*.json'
      - 'build-tokens.js'
      - 'package.json'

jobs:

  # Runs on every branch - builds tokens and checks for errors
  build-check:
    name: Build and validate tokens
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build tokens
        run: npm run build:tokens

      - name: Show build output
        run: |
          echo "Build succeeded. Generated files:"
          ls -lh build/

  # Runs on main branch only - commits the built CSS back to the repo
  commit-output:
    name: Commit built CSS to main
    runs-on: ubuntu-latest
    needs: build-check
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build tokens
        run: npm run build:tokens

      - name: Commit built CSS files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add build/
          if git diff --staged --quiet; then
            echo "No changes to commit - build output is already up to date."
          else
            git commit -m "chore: rebuild tokens from Tokens Studio [skip ci]"
            git push
          fi
