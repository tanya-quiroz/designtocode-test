<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design-to-Code Button Test</title>
  <link rel="stylesheet" href="build/variables.css">
  <style>
    body {
      font-family: var(--font-families-body), system-ui, sans-serif;
      display: grid;
      place-items: center;
      min-height: 100vh;
      margin: 0;
      background: var(--bg-default);
      color: var(--fg-default);
      transition: background 0.2s ease, color 0.2s ease;
    }

    .stage {
      text-align: center;
    }

    .stage h1 {
      margin-bottom: var(--spacing-lg);
      font-family: var(--typography-h1-bold-font-family);
      font-weight: var(--typography-h1-bold-font-weight);
      font-size: var(--typography-h1-bold-font-size);
      line-height: var(--typography-h1-bold-line-height);
      letter-spacing: var(--typography-h1-bold-letter-spacing);
    }

    .btn-primary {
      background: var(--button-primary-background);
      color: var(--button-primary-text);
      border: none;
      border-radius: var(--button-border-radius);
      padding: var(--spacing-sm) var(--spacing-md);
      font-size: var(--font-sizes-body);
      font-family: var(--font-families-body);
      cursor: pointer;
      transition: filter 0.15s ease, background 0.2s ease;
    }

    .btn-primary:hover {
      filter: brightness(0.92);
    }

    .theme-toggle {
      position: fixed;
      top: var(--spacing-md);
      right: var(--spacing-md);
      background: var(--bg-muted);
      color: var(--fg-default);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--border-radius-sm);
      padding: var(--spacing-xs) var(--spacing-sm);
      font-family: var(--font-families-body);
      font-size: var(--font-sizes-body);
      cursor: pointer;
    }

    .theme-toggle:hover {
      background: var(--bg-subtle);
    }
  </style>
</head>
<body>
  <button class="theme-toggle" type="button" aria-label="Toggle theme">
    <span data-theme-label>🌙 Dark</span>
  </button>

  <div class="stage">
    <h1>Button from design tokens</h1>
    <button class="btn-primary">Primary Button</button>
  </div>

  <script>
    (() => {
      const root = document.documentElement;
      const toggle = document.querySelector('.theme-toggle');
      const label = toggle.querySelector('[data-theme-label]');

      const saved = localStorage.getItem('theme');
      if (saved === 'light' || saved === 'dark') {
        root.dataset.theme = saved;
      }
      updateLabel();

      toggle.addEventListener('click', () => {
        const next = root.dataset.theme === 'dark' ? 'light' : 'dark';
        root.dataset.theme = next;
        localStorage.setItem('theme', next);
        updateLabel();
      });

      function updateLabel() {
        label.textContent = root.dataset.theme === 'dark' ? '☀️ Light' : '🌙 Dark';
      }
    })();
  </script>
</body>
</html>
