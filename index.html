<!DOCTYPE html>
<html lang="en" data-brand="brand-a" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design-to-Code Button Test</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Roboto:wght@400;700&display=swap">
  <link rel="stylesheet" href="build/variables.css">
  <link rel="stylesheet" href="build/typography.css">
  <style>
    body {
      font-family: var(--font-families-body), system-ui, sans-serif;
      display: grid;
      place-items: center;
      min-height: 100vh;
      margin: 0;
      background: var(--bg-default);
      color: var(--fg-default);
      transition: background 0.2s ease, color 0.2s ease;
    }

    /* Controls bar */
    .controls {
      position: fixed;
      top: var(--spacing-md);
      right: var(--spacing-md);
      display: flex;
      gap: var(--spacing-xs);
      align-items: center;
    }

    .control-btn {
      background: var(--bg-muted);
      color: var(--fg-default);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--border-radius-sm);
      padding: var(--spacing-xs) var(--spacing-sm);
      font-family: var(--font-families-body);
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.2s ease;
    }

    .control-btn:hover {
      background: var(--bg-subtle);
    }

    .control-btn[aria-pressed="true"] {
      background: var(--accent-default);
      color: var(--accent-on-accent);
      border-color: var(--accent-default);
    }

    .divider {
      width: 1px;
      height: 24px;
      background: var(--bg-subtle);
    }

    /* Button */
    .stage {
      text-align: center;
    }

    .stage h1 {
      margin-bottom: var(--spacing-lg);
    }

    .btn-primary {
      background: var(--button-primary-background);
      color: var(--button-primary-text);
      border: none;
      border-radius: var(--button-border-radius);
      padding: var(--spacing-sm) var(--spacing-md);
      font-size: var(--font-sizes-body);
      font-family: var(--typography-body-font-family);
      cursor: pointer;
      transition: filter 0.15s ease, background 0.2s ease;
    }

    .btn-primary:hover {
      filter: brightness(0.92);
    }
  </style>
</head>
<body>
  <nav class="controls" aria-label="Theme controls">
    <button class="control-btn" data-brand-btn="brand-a" aria-pressed="true">Brand A</button>
    <button class="control-btn" data-brand-btn="brand-b" aria-pressed="false">Brand B</button>
    <div class="divider" role="separator"></div>
    <button class="control-btn" data-theme-btn="light" aria-pressed="true">☀️ Light</button>
    <button class="control-btn" data-theme-btn="dark" aria-pressed="false">🌙 Dark</button>
  </nav>

  <div class="stage">
    <h1 class="typography-h1-bold">Button from design tokens</h1>
    <button class="btn-primary">Primary Button</button>
  </div>

  <script>
    (() => {
      const root = document.documentElement;

      const saved = JSON.parse(localStorage.getItem('dtc-prefs') || '{}');
      if (saved.brand) root.dataset.brand = saved.brand;
      if (saved.theme) root.dataset.theme = saved.theme;

      function updateButtons() {
        document.querySelectorAll('[data-brand-btn]').forEach(btn => {
          btn.setAttribute('aria-pressed', btn.dataset.brandBtn === root.dataset.brand);
        });
        document.querySelectorAll('[data-theme-btn]').forEach(btn => {
          btn.setAttribute('aria-pressed', btn.dataset.themeBtn === root.dataset.theme);
        });
      }

      updateButtons();

      document.querySelectorAll('[data-brand-btn]').forEach(btn => {
        btn.addEventListener('click', () => {
          root.dataset.brand = btn.dataset.brandBtn;
          localStorage.setItem('dtc-prefs', JSON.stringify({ brand: root.dataset.brand, theme: root.dataset.theme }));
          updateButtons();
        });
      });

      document.querySelectorAll('[data-theme-btn]').forEach(btn => {
        btn.addEventListener('click', () => {
          root.dataset.theme = btn.dataset.themeBtn;
          localStorage.setItem('dtc-prefs', JSON.stringify({ brand: root.dataset.brand, theme: root.dataset.theme }));
          updateButtons();
        });
      });
    })();
  </script>
</body>
</html>
