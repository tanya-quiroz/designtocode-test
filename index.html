<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design-to-Code Button Test</title>
  <link rel="stylesheet" href="build/variables.css">
  <style>
    body {
      font-family: var(--font-families-body), system-ui, sans-serif;
      display: grid;
      place-items: center;
      min-height: 100vh;
      margin: 0;
      background: var(--bg-muted);
      color: var(--fg-default);
    }

    .stage {
      text-align: center;
    }

    .stage h1 {
      margin-bottom: var(--spacing-lg);
      font-family: var(--font-families-heading);
      font-weight: var(--font-weights-heading-bold);
    }

    .btn-primary {
      background: var(--button-primary-background);
      color: var(--button-primary-text);
      border: none;
      border-radius: var(--button-border-radius);
      padding: var(--spacing-sm) var(--spacing-md);
      font-size: var(--font-sizes-body);
      font-family: var(--font-families-body);
      cursor: pointer;
      transition: filter 0.15s ease;
    }

    .btn-primary:hover {
      filter: brightness(0.92);
    }
  </style>
</head>
<body>
  <div class="stage">
    <h1>Button from design tokens</h1>
    <button class="btn-primary">Primary Button</button>
  </div>
</body>
</html>
